<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="brand">Calc<span class="dot">.</span></div>
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="keypad">
                <button class="btn fn" data-action="clear">AC</button>
                <button class="btn fn" data-action="delete">⌫</button>
                <button class="btn fn" data-action="toggle-sign">±</button>
                <button class="btn op" data-action="divide">÷</button>

                <button class="btn num" data-number="7">7</button>
                <button class="btn num" data-number="8">8</button>
                <button class="btn num" data-number="9">9</button>
                <button class="btn op" data-action="multiply">×</button>

                <button class="btn num" data-number="4">4</button>
                <button class="btn num" data-number="5">5</button>
                <button class="btn num" data-number="6">6</button>
                <button class="btn op" data-action="subtract">−</button>

                <button class="btn num" data-number="1">1</button>
                <button class="btn num" data-number="2">2</button>
                <button class="btn num" data-number="3">3</button>
                <button class="btn op" data-action="add">+</button>

                <button class="btn fn" data-action="percentage">%</button>
                <button class="btn num" data-number="0">0</button>
                <button class="btn num" data-number=".">.</button>
                <button class="btn eq" data-action="calculate">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
